<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>ZX Spectrum 48K Emulator</title>
<!-- v2.0.3 -->
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { background: #0a0a0a; touch-action: none; }
  #app-canvas { width: 100%; height: 100%; display: block; }
</style>
</head>
<body>
  <canvas id="app-canvas"></canvas>
  <input type="file" id="file-input" accept=".tap,.tzx,.z80,.zip,.rom,.bin" style="display:none">
  <script type="module" src="main.ts"></script>
</body>
</html>
