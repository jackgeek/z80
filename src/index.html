<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ZX Spectrum 48K Emulator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 12px 8px;
  }

  h1 {
    font-size: 1.3em;
    margin-bottom: 10px;
    color: #ff6b6b;
    text-shadow: 0 0 10px rgba(255,107,107,0.5);
    flex-shrink: 0;
  }

  /* ── Main layout ── */
  #main-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 1400px;
    gap: 8px;
  }
  @media (min-width: 1024px) {
    #main-area {
      flex-direction: row;
      align-items: flex-start;
      justify-content: center;
      gap: 16px;
    }
  }

  /* ── Screen side ── */
  #screen-side {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
    width: 100%;
    max-width: 620px;
    position: relative; /* needed for overlay positioning */
  }

  #screen-container {
    padding: clamp(10px, 3vw, 32px) clamp(12px, 4vw, 40px);
    background: #cdcdcd;
    border-radius: 6px;
    box-shadow: 0 0 24px rgba(0,0,0,0.8);
    width: 100%;
  }

  #screen {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    width: 100%;
    height: auto;
    aspect-ratio: 256 / 192;
  }

  #cube-canvas {
    display: none;
    border-radius: 8px;
    box-shadow: 0 0 40px rgba(255,107,107,0.2);
    cursor: grab;
    width: 100%;
    max-width: 560px;
    aspect-ratio: 1;
    height: auto;
  }
  #cube-canvas:active { cursor: grabbing; }

  /* ── Keyboard side ── */
  #keyboard-side {
    display: flex;
    flex-direction: column;
    width: 100%;
    max-width: 700px;
    min-width: 0;
    gap: 8px;
  }
  @media (min-width: 1024px) {
    #keyboard-side {
      flex: 1;
      max-width: 680px;
      align-self: flex-start;
      position: sticky;
      top: 8px;
    }
  }
  #keyboard-side #vkeyboard { margin: 0; }

  /* ── Controls ── */
  #controls {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
  }
  button, label.btn {
    background: #2d2d5e;
    color: #e0e0e0;
    border: 1px solid #4a4a8a;
    padding: 7px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.88em;
    transition: background 0.2s;
  }
  button:hover, label.btn:hover { background: #3d3d7e; border-color: #6a6aba; }
  input[type="file"] { display: none; }

  #cube-toggle-label {
    display: flex; align-items: center; gap: 5px;
    font-size: 0.88em; color: #aaa; cursor: pointer; user-select: none;
  }
  #cube-toggle-label input[type="checkbox"] {
    display: inline; width: 15px; height: 15px;
    cursor: pointer; accent-color: #ff6b6b;
  }

  #joy-type-select {
    background: #2d2d5e; color: #e0e0e0;
    border: 1px solid #4a4a8a; border-radius: 4px;
    padding: 7px 8px; font-family: inherit; font-size: 0.88em;
    cursor: pointer;
  }

  #status { font-size: 0.8em; color: #777; text-align: center; }
  #keyboard-help { font-size: 0.72em; color: #555; text-align: center; line-height: 1.5; }

  /* ── Drop overlay ── */
  #drop-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(26,26,46,0.92); z-index: 100;
    justify-content: center; align-items: center;
    font-size: 2em; color: #ff6b6b;
  }
  #drop-overlay.active { display: flex; }

  /* ══════════════════════════════════════════════════════════
     FULLSCREEN MODE
  ══════════════════════════════════════════════════════════ */
  body.js-fullscreen {
    overflow: hidden;
    padding: 0;
  }
  body.js-fullscreen h1,
  body.js-fullscreen #keyboard-side { display: none; }

  body.js-fullscreen #main-area {
    position: fixed;
    top: 0; left: 0; right: 0;
    /* Use --vh so iOS Safari addresses-bar changes are handled correctly */
    height: calc(var(--vh, 1vh) * 100);
    z-index: 500;
    flex-direction: column;
    align-items: stretch;
    max-width: none;
    gap: 0;
    background: #000;
  }

  body.js-fullscreen #screen-side {
    flex: 1;
    min-height: 0; /* allow flex child to shrink */
    max-width: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  body.js-fullscreen #screen-container {
    padding: 0;
    background: transparent;
    box-shadow: none;
    border-radius: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  body.js-fullscreen #screen {
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    object-fit: contain;
  }

  body.js-fullscreen #cube-canvas {
    max-width: 100%;
    max-height: 100%;
    width: auto !important;
    height: auto !important;
    border-radius: 0;
  }

  /* Fullscreen exit button */
  #fs-exit-btn {
    display: none;
    position: fixed;
    top: 10px; right: 10px;
    z-index: 700;
    width: 40px;
    height: 40px;
    background: rgba(0,0,0,0.65);
    color: #fff;
    border: 2px solid rgba(255,255,255,0.45);
    border-radius: 50%;
    font-size: 1.1em;
    line-height: 1;
    cursor: pointer;
    font-family: inherit;
    touch-action: manipulation;
    display: none;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  #fs-exit-btn:active { background: rgba(60,0,0,0.8); }
  body.js-fullscreen #fs-exit-btn { display: flex; }

  /* ══════════════════════════════════════════════════════════
     JOYSTICK OVERLAY (visible in fullscreen only)
  ══════════════════════════════════════════════════════════ */
  #joystick-overlay {
    display: none;
    pointer-events: none;
    position: absolute;
    inset: 0;
    z-index: 550;
    touch-action: none;
  }
  body.js-fullscreen #joystick-overlay {
    display: flex;
    pointer-events: all;
    position: fixed;
  }

  /* Fire zone — right 40% */
  #js-fire-zone {
    width: 40%;
    margin-left: auto;
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: none;
  }
  #js-fire-btn {
    width: clamp(64px, 18vw, 110px);
    height: clamp(64px, 18vw, 110px);
    border-radius: 50%;
    background: rgba(255, 80, 80, 0.15);
    border: 2px solid rgba(255, 80, 80, 0.35);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    transition: background 0.08s, border-color 0.08s;
    user-select: none;
    pointer-events: none;
  }
  #js-fire-btn .fire-dot {
    width: clamp(18px, 5vw, 32px);
    height: clamp(18px, 5vw, 32px);
    border-radius: 50%;
    background: rgba(255, 80, 80, 0.5);
    transition: background 0.08s;
  }
  #js-fire-btn .fire-label {
    font-size: clamp(9px, 2.2vw, 14px);
    color: rgba(255,120,120,0.8);
    font-family: 'Courier New', monospace;
    font-weight: bold;
    letter-spacing: 1px;
  }
  #js-fire-zone.active #js-fire-btn {
    background: rgba(255, 80, 80, 0.45);
    border-color: rgba(255, 80, 80, 0.9);
  }
  #js-fire-zone.active #js-fire-btn .fire-dot {
    background: rgba(255, 100, 100, 0.9);
  }

  /* D-pad zone — left 40% */
  #js-dpad-zone {
    width: 40%;
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: none;
  }

  /* D-pad cross */
  #js-dpad {
    width: clamp(90px, 22vw, 140px);
    height: clamp(90px, 22vw, 140px);
    position: relative;
    user-select: none;
    pointer-events: none;
  }

  /* Cross arms using pseudo elements + arrow divs */
  .js-dpad-arm {
    position: absolute;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 3px;
    transition: background 0.08s, border-color 0.08s;
    font-size: clamp(10px, 2.8vw, 18px);
    color: rgba(255,255,255,0.5);
  }
  .js-dpad-arm.active {
    background: rgba(255,255,255,0.4);
    border-color: rgba(255,255,255,0.8);
    color: rgba(255,255,255,1);
  }

  /* Arm positions (33% wide/tall, centered) */
  .js-dpad-up    { top: 0;   left: 33%; width: 34%; height: 34%; }
  .js-dpad-down  { bottom:0; left: 33%; width: 34%; height: 34%; }
  .js-dpad-left  { top: 33%; left: 0;   width: 34%; height: 34%; }
  .js-dpad-right { top: 33%; right:0;   width: 34%; height: 34%; }
  /* Centre cap */
  .js-dpad-center {
    position: absolute;
    top: 33%; left: 33%; width: 34%; height: 34%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
  }
</style>
</head>
<body>
  <h1>ZX Spectrum 48K</h1>

  <div id="main-area">

    <div id="screen-side">
      <div id="screen-container">
        <canvas id="screen" width="256" height="192"></canvas>
      </div>
      <canvas id="cube-canvas"></canvas>

      <!-- Joystick overlay — lives here, fixed-positioned in fullscreen -->
      <div id="joystick-overlay">
        <div id="js-dpad-zone">
          <div id="js-dpad">
            <div class="js-dpad-arm js-dpad-up"    data-dir="up">▲</div>
            <div class="js-dpad-arm js-dpad-left"  data-dir="left">◄</div>
            <div class="js-dpad-center"></div>
            <div class="js-dpad-arm js-dpad-right" data-dir="right">►</div>
            <div class="js-dpad-arm js-dpad-down"  data-dir="down">▼</div>
          </div>
        </div>
        <div id="js-fire-zone">
          <div id="js-fire-btn">
            <div class="fire-dot"></div>
            <span class="fire-label">FIRE</span>
          </div>
        </div>
      </div>
    </div>

    <div id="keyboard-side">
      <!-- #vkeyboard inserted here by vkeyboard.js -->

      <div id="controls">
        <label class="btn">
          Load ROM
          <input type="file" id="rom-input" accept=".rom,.bin">
        </label>
        <label class="btn">
          Load TAP / TZX
          <input type="file" id="tap-input" accept=".tap,.tzx,.zip">
        </label>
        <button id="reset-btn">Reset</button>
        <button id="pause-btn">Pause</button>
        <button id="fs-btn">⛶ Fullscreen</button>
        <select id="joy-type-select" title="Joystick type">
          <option value="kempston">Kempston</option>
          <option value="sinclair1">Sinclair 1</option>
          <option value="cursor">Cursor</option>
        </select>
        <label id="cube-toggle-label">
          <input type="checkbox" id="cube-toggle"> Cube mode
        </label>
      </div>

      <div id="status">Loading...</div>

      <div id="keyboard-help">
        Physical: Shift = Caps Shift &nbsp;|&nbsp; Ctrl = Symbol Shift<br>
        Virtual: tap CAPS/SYM to latch, then tap a key
      </div>
    </div>

  </div>

  <button id="fs-exit-btn" title="Exit fullscreen">✕</button>
  <div id="drop-overlay">Drop .tap / .tzx / .zip / .rom here</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="main.js"></script>
  <script src="cube.js"></script>
  <script src="vkeyboard.js"></script>
  <script src="joystick.js"></script>
</body>
</html>
